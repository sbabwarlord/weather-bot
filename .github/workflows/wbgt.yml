name: WBGT Hourly Update

on:
  workflow_dispatch:

permissions:
  contents: write   # required so the workflow can commit & push the state file back

jobs:
  send-wbgt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-telegram-bot

      - name: Run bot
        run: python wbgt_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          THREAD_ID: ${{ secrets.THREAD_ID }}

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_uv_status.txt
          git diff --quiet --cached || git commit -m "Update WBGT status"
          git push
